<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 관리</title>
  <link rel="stylesheet" href="assets/css/reset.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="admin.html">관리자 콘솔<small>상품</small></a></div></header>
  <div class="admin-shell">
    <aside class="admin-sidebar"><nav><a href="admin.html">대시보드</a><a href="admin-categories.html">카테고리</a><a href="admin-freight.html">운반비</a><a href="admin-quotes.html">견적</a><a href="admin-consultations.html">상담</a><a href="admin-users.html">회원</a><a href="admin-admins.html">관리자 계정</a></nav></aside>
    <main class="admin-main" id="admin-products">
      <div class="admin-page-head">
        <h1>상품 관리</h1>
        <a class="button primary" href="admin-product-form.html">상품 생성</a>
      </div>
      <form id="admin-product-search" class="row" style="margin:16px 0">
        <label class="field" style="min-width:280px;max-width:360px;flex:1">검색어
          <input id="admin-product-keyword" class="input" placeholder="상품명, 검색어, 규격 검색">
        </label>
        <label class="field" style="min-width:180px;max-width:220px">상품 상태
          <select id="admin-product-status" class="input">
            <option value="">전체 상태</option>
            <option value="DRAFT">임시저장</option>
            <option value="ON_SALE">판매중</option>
            <option value="QUOTE_ONLY">견적전용</option>
            <option value="SOLD_OUT">품절</option>
            <option value="HIDDEN">숨김</option>
            <option value="DISCONTINUED">판매중단</option>
            <option value="DELETED">삭제됨</option>
          </select>
        </label>
        <button class="button">검색</button>
        <button id="admin-product-include-deleted" class="button" type="button" aria-pressed="false">삭제된 상품까지 보기</button>
      </form>
      <div id="admin-product-state"></div>
      <table class="table"><thead><tr><th>번호</th><th>상품명</th><th>검색어</th><th>카테고리</th><th>상태</th><th></th></tr></thead><tbody></tbody></table>
    </main>
  </div>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/admin-products.js"></script>
</body>
</html>
