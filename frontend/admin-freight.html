<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>운반비 관리</title>
  <link rel="stylesheet" href="assets/css/reset.css"><link rel="stylesheet" href="assets/css/style.css"><link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="admin.html">관리자 콘솔<small>운반비</small></a></div></header>
  <div class="admin-shell">
    <aside class="admin-sidebar"><nav><a href="admin.html">대시보드</a><a href="admin-products.html">상품</a><a href="admin-quotes.html">견적</a><a href="admin-users.html">회원</a><a href="admin-admins.html">관리자 계정</a></nav></aside>
    <main class="admin-main" id="admin-freight">
      <h1>운반비 관리</h1>
      <form class="card admin-form" style="margin-top:16px;max-width:560px">
        <label class="admin-field">출발 지역
          <input class="input" name="originRegion" value="기본" required>
        </label>
        <label class="admin-field">도착 지역
          <input class="input" name="destinationRegion" placeholder="예: 경기" required>
        </label>
        <label class="admin-field">차량 종류
          <select class="input" name="vehicleType"><option value="ONE_TON">1톤</option><option value="FIVE_TON">5톤</option><option value="FIVE_TON_AXIS">5톤 축차</option><option value="TWENTY_FIVE_TON">25톤</option></select>
        </label>
        <label class="admin-field">기본 운반비
          <input class="input" name="baseFreightAmount" type="number" placeholder="예: 300000" required>
        </label>
        <button class="button primary">운반비 룰 저장</button>
        <div id="freight-state"></div>
      </form>
    </main>
  </div>
  <script src="assets/js/config.js"></script><script src="assets/js/api.js"></script><script src="assets/js/admin.js"></script>
</body>
</html>
