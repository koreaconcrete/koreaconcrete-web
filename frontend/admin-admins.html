<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>관리자 계정 관리</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="index.html">관리자 콘솔<small>관리자 계정</small></a><nav class="nav"></nav></div></header>
  <div class="admin-shell">
    <aside class="admin-sidebar"><nav><a href="admin.html">대시보드</a><a href="admin-categories.html">카테고리</a><a href="admin-products.html">상품</a><a href="admin-quotes.html">견적</a><a href="admin-consultations.html">상담</a><a href="admin-users.html">회원</a><a href="admin-admins.html">관리자 계정</a></nav></aside>
    <main class="admin-main" id="admin-admins">
      <div class="admin-page-head">
        <h1>관리자 계정 관리</h1>
      </div>

      <form id="admin-account-form" class="card account-form" style="margin-top:16px">
        <div class="account-form-head">
          <h2>콘솔 계정 생성</h2>
        </div>
        <div class="grid cols-2">
          <label class="field">아이디
            <input class="input" name="loginId" type="text" autocomplete="username" placeholder="영문/숫자 아이디" required>
          </label>
          <label class="field">권한
            <select class="input" name="role" required>
              <option value="ROLE_OPERATOR">운영자 - 견적/상담 관리</option>
              <option value="ROLE_PRODUCT_MANAGER">상품 관리자 - 상품/카테고리 관리</option>
              <option value="ROLE_ADMIN">슈퍼 관리자 - 전체 권한</option>
            </select>
          </label>
        </div>
        <div class="grid cols-2">
          <label class="field">이름
            <input class="input" name="name" type="text" autocomplete="name" placeholder="담당자 이름" required>
          </label>
          <label class="field">연락처
            <input class="input" name="phone" type="tel" autocomplete="tel" placeholder="010-0000-0000">
          </label>
        </div>
        <div class="grid cols-2">
          <label class="field">비밀번호
            <input class="input" name="password" type="password" autocomplete="new-password" required>
          </label>
          <label class="field">비밀번호 확인
            <input class="input" name="passwordConfirm" type="password" autocomplete="new-password" required>
          </label>
        </div>
        <button class="button primary" type="submit">계정 생성</button>
        <div id="admin-account-state"></div>
      </form>

      <section class="card" style="margin-top:16px">
        <h2>콘솔 계정 목록</h2>
        <div id="admin-account-list" style="margin-top:12px"></div>
      </section>
    </main>
  </div>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/admin.js"></script>
</body>
</html>
