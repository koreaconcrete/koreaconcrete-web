<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>한국콘크리트산업 기업 견적몰</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="topbar">
      <a class="brand" href="index.html">한국콘크리트산업<small>토목자재 기업 견적몰</small></a>
      <nav class="nav">
        <a href="products.html">상품</a>
        <a href="cart.html">장바구니</a>
        <a href="quote-new.html">견적요청</a>
        <a href="login.html">로그인</a>
      </nav>
    </div>
  </header>
  <main>
    <section class="hero">
      <div class="container">
        <div class="hero-copy">
          <h1 class="hero-title">
            <span>글로벌 시대에 맞춰 기업문화를</span>
            <strong>이끌어 가는 한국콘크리트 산업</strong>
          </h1>
        </div>
        <form class="search-panel" action="products.html">
          <div class="field">
            <label for="hero-keyword">상품 검색</label>
            <input id="hero-keyword" class="input" name="keyword" placeholder="그레이팅, 300C, 경계석">
          </div>
          <button class="button primary" style="width:100%;margin-top:12px">검색</button>
        </form>
      </div>
    </section>
    <section class="section container company-intro">
      <div class="intro-visual">
        <img src="assets/images/home/facility-imac.png" alt="한국콘크리트산업 소개 이미지">
      </div>
      <div class="intro-copy">
        <p class="eyebrow">한국콘크리트산업</p>
        <h2>믿음과 성실로 공급하는 토목·건축자재</h2>
        <p>토목자재를 생산, 판매하는 회사로서 우수한 품질과 합리적인 가격, 신속한 공급을 약속드립니다. 규격 확인부터 견적 요청까지 현장 발주 흐름에 맞게 이용할 수 있습니다.</p>
        <a class="button primary" href="products.html">전체 제품 보기</a>
      </div>
    </section>
    <section class="section container">
      <div class="section-head">
        <h2>주요 카테고리</h2>
        <a class="button" href="products.html">전체 보기</a>
      </div>
      <div id="category-list" class="row"></div>
    </section>
    <section class="section container">
      <div class="section-head">
        <h2>인기 상품</h2>
      </div>
      <div id="featured-products" class="grid cols-3"></div>
    </section>
  </main>
  <footer class="footer"><div class="container">부가세 정책은 상품 및 견적 조건에 따라 달라질 수 있습니다.</div></footer>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/products.js"></script>
</body>
</html>
