<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상품 목록</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="index.html">한국콘크리트산업<small>상품 카탈로그</small></a><nav class="nav"><a href="products.html">상품</a><a href="cart.html">장바구니</a><a href="quote-new.html">견적요청</a><a href="login.html">로그인</a></nav></div></header>
  <main class="container">
    <div class="page-title"><h1>상품 목록</h1><p class="muted">상품명, 카테고리, 규격, 스펙 기준으로 검색합니다.</p></div>
    <form id="product-search" class="toolbar">
      <label class="field">검색어
        <input id="keyword-filter" class="input" placeholder="상품명, 규격, 검색어">
      </label>
      <label class="field">카테고리
        <select id="category-filter" class="input"></select>
      </label>
      <label class="field">정렬
        <select id="sort-filter" class="input"><option value="latest">최신순</option><option value="name">이름순</option></select>
      </label>
      <button class="button primary">검색</button>
    </form>
    <div id="category-list" class="category-filter-panel"></div>
    <div id="product-list" class="grid cols-3"></div>
    <div id="product-pagination" class="pagination"></div>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/products.js"></script>
</body>
</html>
