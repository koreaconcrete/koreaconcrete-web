<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>회원가입</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="index.html">한국콘크리트산업<small>회원가입</small></a><nav class="nav"><a href="login.html">로그인</a><a href="products.html">상품</a></nav></div></header>
  <main class="auth-main">
    <section class="auth-card wide" aria-labelledby="signup-title">
      <div class="auth-heading">
        <p class="eyebrow">현장 구매 담당자 등록</p>
        <h1 id="signup-title">회원가입</h1>
        <p>견적 요청 내역과 상담 진행 상태를 한 곳에서 확인할 수 있습니다.</p>
      </div>
      <form id="signup-form" class="auth-form" novalidate>
        <div class="field">
          <label for="signup-email">아이디</label>
          <div class="input-with-action">
            <input id="signup-email" class="input" type="text" name="email" placeholder="아이디" autocomplete="username" required>
            <button class="button" type="button" id="login-id-check">중복 확인</button>
          </div>
        </div>
        <div id="login-id-state" class="form-hint"></div>
        <label class="field" for="signup-password">비밀번호
          <input id="signup-password" class="input" type="password" name="password" placeholder="비밀번호" autocomplete="new-password" required>
        </label>
        <label class="field" for="signup-password-confirm">비밀번호 확인
          <input id="signup-password-confirm" class="input" type="password" name="passwordConfirm" placeholder="비밀번호 확인" autocomplete="new-password" required>
        </label>
        <label class="field" for="signup-name">이름
          <input id="signup-name" class="input" name="name" placeholder="이름" autocomplete="name" required>
        </label>
        <label class="field" for="signup-phone">연락처
          <input id="signup-phone" class="input" name="phone" placeholder="010-0000-0000" autocomplete="tel">
        </label>
        <label class="row"><input type="checkbox" name="termsAgreed" required> 약관 동의</label>
        <label class="row"><input type="checkbox" name="privacyAgreed" required> 개인정보 수집 동의</label>
        <label class="row"><input type="checkbox" name="marketingAgreed"> 마케팅 수신 동의</label>
        <button class="button primary">가입하기</button>
        <div id="auth-state"></div>
      </form>
      <div class="auth-switch">
        <span>이미 계정이 있나요?</span>
        <a class="button" href="login.html">로그인</a>
      </div>
    </section>
    <div class="modal-backdrop" id="signup-welcome-modal" hidden>
      <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="signup-welcome-title">
        <h2 id="signup-welcome-title">회원가입을 환영합니다</h2>
        <p class="muted">가입이 완료되었습니다. 잠시 후 메인 페이지로 이동합니다.</p>
        <div class="modal-actions">
          <button class="button primary" type="button" data-signup-home>메인으로 이동</button>
        </div>
      </section>
    </div>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/auth.js"></script>
</body>
</html>
