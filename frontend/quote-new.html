<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>견적요청</title>
  <link rel="stylesheet" href="assets/css/reset.css">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header"><div class="topbar"><a class="brand" href="index.html">한국콘크리트산업<small>견적요청</small></a><nav class="nav"><a href="products.html">상품</a><a href="cart.html">장바구니</a></nav></div></header>
  <main class="container section">
    <div class="grid quote-request-flow">
      <section class="quote-items-panel">
        <h2>품목 목록</h2>
        <div id="quote-items"></div>
      </section>
      <form id="quote-form" class="card grid">
        <h1>견적요청</h1>
        <div class="field"><label>회사명</label><input class="input" name="companyName" required></div>
        <div class="field"><label>담당자명</label><input class="input" name="contactName" required></div>
        <div class="field"><label>연락처</label><input class="input" name="contactPhone" required></div>
        <div class="field"><label>현장주소</label><input class="input" name="siteAddress" required></div>
        <div class="field"><label>희망납기</label><input class="input" type="date" name="requestedDeliveryDate"></div>
        <div class="field"><label>요청사항(선택)</label><textarea name="memo"></textarea></div>
        <section class="agreement-panel compact" aria-label="개인정보 수집 동의">
          <div class="agreement-list">
            <article class="agreement-item">
              <div class="agreement-item-head">
                <label class="agreement-check"><input type="checkbox" name="privacyAgreed" required> <span>개인정보 수집·이용 동의 <small>필수</small></span></label>
                <button class="agreement-toggle" type="button" aria-expanded="false" aria-controls="quote-privacy-detail" data-agreement-toggle="quote-privacy-detail">자세히 보기</button>
              </div>
              <div class="agreement-detail" id="quote-privacy-detail" hidden>
                <p>견적 접수와 연락을 위해 회사명, 담당자명, 연락처, 현장주소, 요청사항을 수집하며 견적 처리 및 이력 확인 목적으로 보관합니다.</p>
              </div>
            </article>
          </div>
        </section>
        <button class="button primary">견적요청 접수</button>
        <div id="quote-state"></div>
      </form>
    </div>
  </main>
  <script src="assets/js/config.js"></script>
  <script src="assets/js/api.js"></script>
  <script src="assets/js/quote.js"></script>
</body>
</html>
