spring:
  application:
    name: koreaconcrete-web
  servlet:
    multipart:
      max-file-size: ${APP_UPLOAD_MAX_FILE_SIZE:8MB}
      max-request-size: ${APP_UPLOAD_MAX_REQUEST_SIZE:10MB}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/koreaconcrete}
    username: ${DB_USERNAME:koreaconcrete}
    password: ${DB_PASSWORD:koreaconcrete}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:43200}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:8080,null}
  upload:
    base-dir: ${APP_UPLOAD_BASE_DIR:uploads}
    public-url-prefix: ${APP_UPLOAD_PUBLIC_URL_PREFIX:/uploads}
    max-image-size-bytes: ${APP_UPLOAD_MAX_IMAGE_SIZE_BYTES:8388608}

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:15432/koreaconcrete}
    username: ${DB_USERNAME:koreaconcrete}
    password: ${DB_PASSWORD:koreaconcrete}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:h2:mem:koreaconcrete-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate

app:
  jwt:
    secret: test-secret-test-secret-test-secret-test-secret
    expiration-seconds: 3600
